<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GraphRAGX - 影响分析</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <div class="bg-glow bg-glow-a"></div>
  <div class="bg-glow bg-glow-b"></div>
  <main class="shell">
    <header class="topbar panel">
      <div class="brand-block">
        <a class="brand" href="/">GraphRAGX</a>
        <div class="brand-subtitle">Powered by Graph AI. RAG for Everything.</div>
      </div>
      <nav class="topnav">
        <a href="/search">检索中心</a>
        <a class="is-active" href="/scenarios/impact">业务场景</a>
        <a href="/manage/projects">管理中心</a>
      </nav>
      <div class="actor-inline">
        <label>Actor<input id="actorUser" value="alice" /></label>
        <label>Role
          <select id="actorRole">
            <option value="admin">admin</option>
            <option value="editor">editor</option>
            <option value="viewer">viewer</option>
          </select>
        </label>
      </div>
    </header>

    <section class="panel hero">
      <p class="kicker">Scenario Workspace</p>
      <h1>变更影响分析</h1>
      <p class="sub">输入变更文件，快速识别可能受影响的符号集合。</p>
    </section>

    <section class="workspace single-main">
      <article class="panel">
        <form id="impactForm" class="stack">
          <label>项目
            <select id="impactProjectId" required></select>
          </label>
          <label>变更文件（每行一个）
            <textarea name="file_paths" rows="8" placeholder="src/payment/retry.py&#10;src/payment/service.py"></textarea>
          </label>
          <div class="row-actions">
            <button class="btn" type="submit">分析影响</button>
            <a class="btn ghost" href="/search">返回检索中心</a>
          </div>
        </form>
        <pre id="impactBox" class="answer">等待分析...</pre>
      </article>
      <aside class="aside-stack">
        <article class="panel">
          <h2>来源上下文</h2>
          <div id="prefillInfo" class="meta-list"></div>
        </article>
        <article class="panel">
          <h2>系统消息</h2>
          <pre id="systemLog" class="log"></pre>
        </article>
      </aside>
    </section>
  </main>
  <script src="/static/common.js"></script>
  <script src="/static/impact.js"></script>
</body>
</html>
