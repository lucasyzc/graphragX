<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GraphRAGX - 管理中心 / 同步管理</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <div class="bg-glow bg-glow-a"></div>
  <div class="bg-glow bg-glow-b"></div>
  <main class="shell">
    <header class="topbar panel">
      <div class="brand-block">
        <a class="brand" href="/">GraphRAGX</a>
        <div class="brand-subtitle">Powered by Graph AI. RAG for Everything.</div>
      </div>
      <nav class="topnav">
        <a href="/search">检索中心</a>
        <a href="/scenarios/impact">业务场景</a>
        <a class="is-active" href="/manage/projects">管理中心</a>
      </nav>
      <div class="actor-inline">
        <label>Actor<input id="actorUser" value="alice" /></label>
        <label>Role
          <select id="actorRole">
            <option value="admin">admin</option>
            <option value="editor">editor</option>
            <option value="viewer">viewer</option>
          </select>
        </label>
      </div>
    </header>

    <section class="panel hero">
      <p class="kicker">Management Center</p>
      <h1>同步管理</h1>
      <p class="sub">监控运行中任务与历史记录，按项目和状态筛选。</p>
      <div class="subtabs">
        <a class="chip" href="/manage/projects">项目管理</a>
        <a class="chip is-active" href="/manage/sync">同步管理</a>
        <a class="chip" href="/manage/knowledge">知识库管理</a>
      </div>
    </section>

    <section class="workspace single-main">
      <article class="panel">
        <div class="toolbar">
          <label>项目
            <select id="filterProjectId">
              <option value="">全部</option>
            </select>
          </label>
          <label>状态
            <select id="filterStatus">
              <option value="">全部</option>
              <option value="queued">queued</option>
              <option value="running">running</option>
              <option value="done">done</option>
              <option value="failed">failed</option>
            </select>
          </label>
          <label class="checkbox-line">
            <input id="autoRefresh" type="checkbox" checked />
            自动刷新（10s）
          </label>
          <button id="refreshJobsBtn" class="btn ghost" type="button">刷新</button>
        </div>

        <form id="syncForm" class="stack">
          <h2>触发同步任务</h2>
          <label>项目
            <select id="syncProjectId" required></select>
          </label>
          <label>模式
            <select name="mode">
              <option value="incremental">incremental</option>
              <option value="full">full</option>
            </select>
          </label>
          <label>Head SHA（可选）
            <input name="head_sha" placeholder="留空表示按默认分支最新提交同步" />
          </label>
          <label>Base SHA（可选，增量对比起点）
            <input name="base_sha" placeholder="留空则使用最近一次成功同步的 commit" />
          </label>
          <label>Since SHA（可选，base_sha 的别名）
            <input name="since_sha" placeholder="仅当 base_sha 为空时生效" />
          </label>
          <button id="triggerSyncBtn" class="btn" type="submit">触发同步</button>
          <p id="syncMsg" class="message"></p>
        </form>

        <h2>运行中任务</h2>
        <div id="runningJobsBoard" class="card-grid"></div>

        <h2>任务历史</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Job ID</th>
                <th>项目</th>
                <th>模式</th>
                <th>状态</th>
                <th>消息</th>
                <th>创建时间</th>
              </tr>
            </thead>
            <tbody id="jobsBody"></tbody>
          </table>
        </div>
      </article>

      <aside class="aside-stack">
        <article class="panel">
          <h2>系统消息</h2>
          <pre id="systemLog" class="log"></pre>
        </article>
      </aside>
    </section>
  </main>
  <script src="/static/common.js"></script>
  <script src="/static/manage-sync.js"></script>
</body>
</html>
