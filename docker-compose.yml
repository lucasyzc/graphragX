services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: codegraphrag
      POSTGRES_PASSWORD: codegraphrag
      POSTGRES_DB: codegraphrag
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/codegraphrag
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data

  qdrant:
    image: qdrant/qdrant:v1.15.4
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  api:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg://codegraphrag:codegraphrag@postgres:5432/codegraphrag
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: codegraphrag
      QDRANT_URL: http://qdrant:6333
      ENABLE_EXTERNAL_STORES: "true"
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - neo4j
      - qdrant

volumes:
  postgres_data:
  neo4j_data:
  qdrant_data:
